<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Alc Homes</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{
  --bk:#003580;--bk2:#1a4ea0;--acc:#0071c2;--yel:#febb02;
  --avail:#e8f7ea;--avail-t:#1e7e34;
  --blocked:#fde8e8;--blocked-t:#c0392b;
  --booked:#dce9ff;--booked-t:#003580;
  --ov:#f0a500;
  --border:#d9d9d9;--ink:#1a1a1a;--muted:#6b7280;
  --bg:#f2f2f2;--card:#fff;
  --cell:68px;--lbl:108px;
}
html,body{background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:13px}
#app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:60px}

/* LOGIN */
#login-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;background:var(--bk);padding:32px 24px;
}
.logo{color:#fff;font-size:22px;font-weight:800;letter-spacing:.5px}
.logo span{color:var(--yel)}
#login-screen p{color:rgba(255,255,255,.7);font-size:13px;margin:6px 0 32px}
#pin-dots{display:flex;gap:16px;margin-bottom:28px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.35);background:transparent}
.pin-dot.filled{background:#fff;border-color:#fff}
#keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:260px}
.key{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  border-radius:12px;color:#fff;font-size:20px;font-weight:500;
  padding:16px 0;text-align:center;cursor:pointer;
}
.key:active{background:rgba(255,255,255,.22)}
.key.wide{font-size:13px;color:rgba(255,255,255,.65)}
#login-error{color:#ffbbbb;font-size:12px;height:18px;margin-top:12px}

/* TOPBAR */
#topbar{
  background:var(--bk);padding:10px 12px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:20;
}
#status-pill{background:rgba(255,255,255,.15);color:#fff;font-size:11px;padding:3px 9px;border-radius:99px}

/* ROOM TABS */
#room-tabs{
  display:flex;gap:6px;overflow-x:auto;padding:8px 10px;
  background:var(--bk2);scrollbar-width:none;
}
#room-tabs::-webkit-scrollbar{display:none}
.rtab{
  flex:0 0 auto;padding:5px 13px;border-radius:99px;font-size:12px;
  font-weight:600;color:rgba(255,255,255,.7);
  border:1px solid rgba(255,255,255,.22);cursor:pointer;white-space:nowrap;
}
.rtab.active{background:#fff;color:var(--bk);border-color:#fff}

/* MONTH NAV */
#month-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:var(--card);border-bottom:1px solid var(--border);
}
#month-label{font-size:14px;font-weight:700;color:var(--bk)}
.mnav{
  background:var(--bk);color:#fff;border:none;
  border-radius:6px;width:30px;height:30px;font-size:17px;cursor:pointer;
}

/* CALENDAR */
#cal-wrap{overflow-x:auto;background:var(--card)}
#cal-wrap::-webkit-scrollbar{height:4px}
#cal-wrap::-webkit-scrollbar-thumb{background:var(--acc);border-radius:2px}

table#cal{border-collapse:collapse;min-width:max-content}
table#cal th,table#cal td{border-bottom:1px solid var(--border);border-right:1px solid var(--border)}

.col-lbl{
  width:var(--lbl);min-width:var(--lbl);
  position:sticky;left:0;background:var(--card);z-index:5;
}
.col-lbl.hd{background:#f7f8fa}

.th-date{
  width:var(--cell);min-width:var(--cell);
  text-align:center;padding:5px 2px;background:#f7f8fa;
}
.th-date .wd{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase}
.th-date .dd{font-size:14px;font-weight:700;color:var(--ink)}
.th-date.today .dd{
  background:var(--acc);color:#fff;width:26px;height:26px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;
}
.th-date.wknd{background:#eef0f3}

.row-lbl{
  padding:5px 8px;font-size:11px;
  font-weight:700;text-align:left;white-space:nowrap;background:var(--card);
}
.row-lbl.main{font-size:12px;color:var(--ink);border-top:2px solid var(--bk)}
.row-lbl.price{color:var(--acc);font-weight:600}
.row-lbl.guest{color:var(--muted);font-weight:500}

/* Status cells */
.c-status{text-align:center;padding:5px 2px;font-size:10px;font-weight:700;cursor:pointer}
.c-status.av{background:var(--avail);color:var(--avail-t)}
.c-status.bl{background:var(--blocked);color:var(--blocked-t)}
.c-status.bk{background:var(--booked);color:var(--booked-t)}

/* Guest cells */
.c-guest{
  text-align:center;padding:2px 3px;font-size:9px;font-weight:600;
  color:var(--booked-t);height:20px;overflow:hidden;
  white-space:nowrap;text-overflow:ellipsis;max-width:var(--cell);cursor:pointer;
}

/* Price cells */
.c-price{
  text-align:center;padding:6px 2px;font-size:12px;
  font-weight:700;color:var(--ink);cursor:pointer;
}
.c-price.ov{color:var(--ov)}
.c-price.na{color:#c0c0c0;font-weight:400}
.c-price.dim{color:#bbb;text-decoration:line-through;font-weight:400}
.c-price:active{background:#f0f7ff}

/* OVERLAY + EDIT PANEL */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity .2s;z-index:30}
#overlay.open{opacity:1;pointer-events:auto}
#edit-panel{
  position:fixed;left:0;right:0;bottom:0;background:var(--card);
  border-radius:18px 18px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.15);
  padding:20px 20px 36px;max-width:520px;margin:0 auto;
  transform:translateY(110%);transition:transform .25s ease;z-index:31;
}
#edit-panel.open{transform:translateY(0)}
.ep-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ep-hd h2{font-size:15px;font-weight:700;color:var(--bk)}
.ep-x{background:#f2f2f2;border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;color:var(--muted)}

.av-row{display:flex;gap:8px;margin-bottom:14px}
.av-btn{
  flex:1;padding:10px 0;border-radius:8px;border:1.5px solid var(--border);
  font-size:13px;font-weight:600;cursor:pointer;background:var(--card);color:var(--muted);
}
.av-btn.ok{background:var(--avail);border-color:var(--avail-t);color:var(--avail-t)}
.av-btn.no{background:var(--blocked);border-color:var(--blocked-t);color:var(--blocked-t)}

.range-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:12px;color:var(--muted)}
.range-row input{flex:1;padding:7px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:12px}
.range-row input:focus{outline:none;border-color:var(--acc)}

.price-row-ep{margin-bottom:14px}
.price-row-ep label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.price-row-ep input{
  width:100%;padding:10px 12px;border:1.5px solid var(--border);
  border-radius:8px;font-size:18px;font-weight:700;text-align:right;
}
.price-row-ep input:focus{outline:none;border-color:var(--acc)}
.price-hint{font-size:11px;color:var(--muted);margin-top:3px}

.ep-acts{display:flex;gap:10px;margin-top:4px}
.ep-acts button{flex:1;padding:12px 0;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer}
#save-btn{background:var(--acc);color:#fff}
#save-btn:active{background:var(--bk)}
#cancel-btn{background:#f2f2f2;color:var(--muted)}
</style>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div id="login-screen">
  <div class="logo">alc<span>homes</span></div>
  <p>Panel de gestión</p>
  <div id="pin-dots"></div>
  <div id="keypad"></div>
  <div id="login-error"></div>
</div>

<!-- MAIN -->
<div id="main-screen" style="display:none">
  <div id="topbar">
    <div class="logo">alc<span>homes</span></div>
    <div id="status-pill">Cargando…</div>
  </div>
  <div id="room-tabs"></div>
  <div id="month-nav">
    <button class="mnav" id="prev-m">‹</button>
    <div id="month-label"></div>
    <button class="mnav" id="next-m">›</button>
  </div>
  <div id="cal-wrap">
    <table id="cal"><tbody id="cal-body"></tbody></table>
  </div>
</div>

<!-- EDIT PANEL -->
<div id="overlay"></div>
<div id="edit-panel">
  <div class="ep-hd">
    <h2 id="ep-title">Editar</h2>
    <button class="ep-x" id="ep-x">✕</button>
  </div>
  <div class="av-row">
    <button class="av-btn" id="btn-open">✓ Disponible</button>
    <button class="av-btn" id="btn-blocked">✗ Cerrar</button>
  </div>
  <div class="range-row">
    <span>Del</span>
    <input type="date" id="ep-from"/>
    <span>al</span>
    <input type="date" id="ep-to"/>
  </div>
  <div class="price-row-ep">
    <label>Standard Rate (€)</label>
    <input type="number" id="ep1" inputmode="decimal" step="0.5" placeholder="—"/>
    <div class="price-hint">No Reembolsable y Tarifa Semanal las calcula Booking.com automáticamente</div>
  </div>
  <div class="ep-acts">
    <button id="cancel-btn">Cancelar</button>
    <button id="save-btn">Guardar en Beds24</button>
  </div>
</div>
</div>

<script>
const API="https://hostal-pdf-extractor.onrender.com/mobile";
const DAYS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

let PIN="",ROOMS=[],ROOM=null,CUR=new Date();
let BOOKINGS=[],PRICES={},SEL=null,AVAIL=1;
const $=s=>document.querySelector(s);

// LOGIN
function dots(){
  const w=$("#pin-dots");w.innerHTML="";
  for(let i=0;i<4;i++){const d=document.createElement("div");d.className="pin-dot"+(i<PIN.length?" filled":"");w.appendChild(d);}
}
function keypad(){
  const keys=["1","2","3","4","5","6","7","8","9","⌫","0","OK"];
  const w=$("#keypad");w.innerHTML="";
  keys.forEach(k=>{const b=document.createElement("button");b.className="key"+(k==="⌫"||k==="OK"?" wide":"");b.textContent=k;b.onclick=()=>key(k);w.appendChild(b);});
}
async function key(k){
  if(k==="⌫")PIN=PIN.slice(0,-1);
  else if(k==="OK"){await login();return;}
  else if(PIN.length<4)PIN+=k;
  dots();if(PIN.length===4)await login();
}
async function login(){
  $("#login-error").textContent="";
  try{
    const r=await fetch(`${API}/login`,{method:"POST",headers:{"content-type":"application/json","x-app-pin":PIN},body:JSON.stringify({pin:PIN})});
    const d=await r.json();
    if(d.ok){$("#login-screen").style.display="none";$("#main-screen").style.display="block";await init();}
    else{$("#login-error").textContent="PIN incorrecto";PIN="";dots();}
  }catch{$("#login-error").textContent="Sin conexión";PIN="";dots();}
}

// MAIN
async function init(){
  const r=await fetch(`${API}/rooms`,{headers:{"x-app-pin":PIN}});
  const d=await r.json();
  ROOMS=d.rooms||[];ROOM=ROOMS[0];
  renderTabs();await load();
}
function renderTabs(){
  const w=$("#room-tabs");w.innerHTML="";
  ROOMS.forEach(rm=>{const t=document.createElement("div");t.className="rtab"+(rm.id===ROOM.id?" active":"");t.textContent=rm.name;t.onclick=async()=>{ROOM=rm;renderTabs();await load();};w.appendChild(t);});
}
function mstr(){return`${CUR.getFullYear()}-${String(CUR.getMonth()+1).padStart(2,"0")}`;}

async function load(){
  pill("Cargando…");
  try{
    const r=await fetch(`${API}/calendar?roomId=${ROOM.id}&month=${mstr()}&pin=${PIN}`,{headers:{"x-app-pin":PIN}});
    const d=await r.json();
    if(!d.ok)throw new Error(d.error);
    BOOKINGS=d.bookings||[];PRICES=d.prices||{};
    render();pill(`${ROOM.name} · ${MONTHS[CUR.getMonth()]}`);
  }catch(e){pill("Error: "+e.message);}
}
function pill(t){$("#status-pill").textContent=t}
$("#prev-m").onclick=async()=>{CUR=new Date(CUR.getFullYear(),CUR.getMonth()-1,1);await load();};
$("#next-m").onclick=async()=>{CUR=new Date(CUR.getFullYear(),CUR.getMonth()+1,1);await load();};

// RENDER
function bookedOn(ds){return BOOKINGS.find(b=>b.arrival&&b.departure&&ds>=b.arrival&&ds<b.departure);}
function fmtPrice(v){return v!=null?("€"+Number(v).toFixed(0)):"—";}

function render(){
  const y=CUR.getFullYear(),m=CUR.getMonth();
  const days=new Date(y,m+1,0).getDate();
  const today=new Date().toISOString().slice(0,10);
  $("#month-label").textContent=`${MONTHS[m]} ${y}`;
  const tb=$("#cal-body");tb.innerHTML="";

  const dates=[];
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dow=new Date(ds+"T12:00:00").getDay();
    dates.push({ds,d,dow});
  }

  // ── Header row ──
  const trH=document.createElement("tr");
  const cornerTh=document.createElement("th");cornerTh.className="col-lbl hd";trH.appendChild(cornerTh);
  dates.forEach(({ds,d,dow})=>{
    const th=document.createElement("th");
    th.className="th-date"+(ds===today?" today":"")+(dow===0||dow===6?" wknd":"");
    th.innerHTML=`<div class="wd">${DAYS[dow]}</div><div class="dd">${d}</div>`;
    trH.appendChild(th);
  });
  tb.appendChild(trH);

  // ── Status row ──
  const trS=document.createElement("tr");
  const lblS=document.createElement("td");lblS.className="col-lbl row-lbl main";lblS.textContent="Disponibilidad";trS.appendChild(lblS);
  dates.forEach(({ds})=>{
    const bk=bookedOn(ds);
    const pr=PRICES[ds]||{};
    const bl=pr.numAvail===0;
    const td=document.createElement("td");
    td.className="c-status"+(bk?" bk":bl?" bl":" av");
    td.textContent=bk?"✖":bl?"—":"✔";
    td.onclick=()=>openEdit(ds,pr);trS.appendChild(td);
  });
  tb.appendChild(trS);

  // ── Guest row ──
  const trG=document.createElement("tr");
  const lblG=document.createElement("td");lblG.className="col-lbl row-lbl guest";lblG.textContent="Huésped";trG.appendChild(lblG);
  dates.forEach(({ds})=>{
    const bk=bookedOn(ds);
    const td=document.createElement("td");td.className="c-guest";
    td.textContent=bk?(bk.guestName||"").split(" ")[0]:"";
    td.onclick=()=>openEdit(ds,PRICES[ds]||{});trG.appendChild(td);
  });
  tb.appendChild(trG);

  // ── Standard Rate row ──
  const trP=document.createElement("tr");
  const lblP=document.createElement("td");lblP.className="col-lbl row-lbl price";lblP.textContent="Standard Rate";trP.appendChild(lblP);
  dates.forEach(({ds})=>{
    const bk=bookedOn(ds);const pr=PRICES[ds]||{};const bl=pr.numAvail===0;
    const td=document.createElement("td");
    let cls="c-price";
    if(bk||bl)cls+=" dim";
    else if(pr.isOverride)cls+=" ov";
    else if(pr.price1==null)cls+=" na";
    td.className=cls;
    td.textContent=fmtPrice(pr.price1);
    td.onclick=()=>openEdit(ds,pr);trP.appendChild(td);
  });
  tb.appendChild(trP);
}

// EDIT PANEL
function openEdit(ds,info){
  SEL=ds;AVAIL=info.numAvail===0?0:1;
  const lbl=new Date(ds+"T12:00:00").toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"});
  $("#ep-title").textContent=lbl.charAt(0).toUpperCase()+lbl.slice(1);
  $("#ep-from").value=ds;$("#ep-to").value=ds;
  $("#ep1").value=info.price1!=null?info.price1:"";
  updToggle();
  $("#edit-panel").classList.add("open");$("#overlay").classList.add("open");
}
function closeEdit(){$("#edit-panel").classList.remove("open");$("#overlay").classList.remove("open");}
function updToggle(){
  $("#btn-open").className="av-btn"+(AVAIL===1?" ok":"");
  $("#btn-blocked").className="av-btn"+(AVAIL===0?" no":"");
}
$("#btn-open").onclick=()=>{AVAIL=1;updToggle();};
$("#btn-blocked").onclick=()=>{AVAIL=0;updToggle();};
$("#cancel-btn").onclick=closeEdit;
$("#ep-x").onclick=closeEdit;
$("#overlay").onclick=closeEdit;

$("#save-btn").onclick=async()=>{
  const from=$("#ep-from").value||SEL;
  const to=$("#ep-to").value||SEL;
  const body={pin:PIN,roomId:ROOM.id,from,to,numAvail:AVAIL};
  const v=$("#ep1").value;
  if(v!="")body.price1=Number(v);
  const btn=$("#save-btn");btn.textContent="Guardando…";btn.disabled=true;
  try{
    const r=await fetch(`${API}/update`,{
      method:"POST",
      headers:{"content-type":"application/json","x-app-pin":PIN},
      body:JSON.stringify(body)
    });
    const d=await r.json();
    if(d.ok){closeEdit();await load();}
    else alert("Error: "+(d.error?.message||JSON.stringify(d.error)));
  }catch{alert("Error de conexión");}
  finally{btn.textContent="Guardar en Beds24";btn.disabled=false;}
};

keypad();dots();
</script>
</body>
</html>
