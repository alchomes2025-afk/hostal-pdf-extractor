<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>

<!-- PWA: oculta barra del navegador al añadir a pantalla de inicio -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Alchomes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#003580"/>
<link rel="manifest" href="manifest.json"/>

<title>Alchomes</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{
  --bk:#003580;--bk2:#1a4ea0;--acc:#0071c2;--yel:#febb02;
  --avail:#1e7e34;--avail-bg:#e8f7ea;
  --blocked:#c0392b;--blocked-bg:#fde8e8;
  --booked:#0071c2;--booked-bg:#dce9ff;
  --muted:#6b7280;--border:#e5e7eb;--ink:#111827;
  --cell:56px;--radius:16px;
}
html,body{
  height:100%;background:#f5f5f7;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  font-size:13px;color:var(--ink);
  /* Prevent bounce scroll on iOS */
  overscroll-behavior:none;
}
#app{display:flex;flex-direction:column;height:100%;max-width:520px;margin:0 auto}

/* ── LOGIN ─────────────────────────────────────────── */
#login-screen{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:var(--bk);padding:32px 24px;
}
.logo{color:#fff;font-size:24px;font-weight:800;letter-spacing:.3px;margin-bottom:4px}
.logo em{color:var(--yel);font-style:normal}
.logo-sub{color:rgba(255,255,255,.5);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:40px}
#pin-dots{display:flex;gap:18px;margin-bottom:32px}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:transparent;transition:all .15s}
.pin-dot.filled{background:#fff;border-color:#fff;transform:scale(1.15)}
#keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:264px}
.key{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:14px;color:#fff;font-size:22px;font-weight:400;
  padding:15px 0;text-align:center;cursor:pointer;user-select:none;
  transition:background .1s;
}
.key:active{background:rgba(255,255,255,.2)}
.key.sub{font-size:12px;color:rgba(255,255,255,.5);font-weight:500}
#login-err{color:#ff8a80;font-size:12px;height:16px;margin-top:14px;text-align:center}

/* ── MAIN SCREEN ────────────────────────────────────── */
#main-screen{flex:1;display:none;flex-direction:column;overflow:hidden}

/* Topbar */
#topbar{
  background:var(--bk);padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
#topbar .logo{font-size:17px;margin-bottom:0}
#sync-pill{
  font-size:11px;font-weight:600;color:rgba(255,255,255,.7);
  background:rgba(255,255,255,.12);padding:3px 10px;border-radius:99px;
}

/* ── TABLA MULTI-HABITACIÓN ─────────────────────────── */
/* Columna sticky de nombre de habitación */
.col-corner{
  position:sticky;left:0;top:0;z-index:30;
  width:82px;min-width:82px;
  background:var(--bk);
}
.room-lbl{
  position:sticky;left:0;z-index:10;
  width:82px;min-width:82px;
  background:#f0f4ff;
  border-right:3px solid var(--bk);
  padding:0 8px;vertical-align:middle;
  cursor:default;
}
.room-name{
  font-size:12px;font-weight:800;
  color:var(--bk);line-height:1.2;
  text-transform:uppercase;letter-spacing:.3px;
}
.room-sub{
  font-size:10px;color:var(--muted);font-weight:500;margin-top:1px;
}
/* Separadores entre habitaciones */
.room-row td,.room-row th{border-bottom:2px solid #e2e8f0}
.room-row:last-child td{border-bottom:none}

/* Calendar wrapper — scroll bidireccional */
#cal-wrap{
  flex:1;overflow:auto;background:#fff;
  -webkit-overflow-scrolling:touch;
}
#cal-wrap::-webkit-scrollbar{height:3px;width:3px}
#cal-wrap::-webkit-scrollbar-thumb{background:var(--acc);border-radius:2px}

/* Barra de mes sticky */
#month-bar{
  background:var(--bk2);
  padding:8px 14px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;
  border-bottom:2px solid rgba(0,0,0,.15);
}
#month-bar-text{
  font-size:15px;font-weight:700;color:#fff;letter-spacing:.2px;
}
#month-bar-today{
  font-size:11px;font-weight:700;color:var(--bk);
  background:var(--yel);padding:4px 12px;border-radius:99px;
  cursor:pointer;user-select:none;
  border:none;
}

/* Calendar table */
#cal{border-collapse:collapse;table-layout:fixed}
#cal th,#cal td{
  width:var(--cell);min-width:var(--cell);
  border-right:1px solid var(--border);border-bottom:1px solid var(--border);
  user-select:none;
}

/* Day header — sticky top */
.th-date{
  background:#f0f4ff;text-align:center;padding:6px 2px 5px;
  cursor:default;position:sticky;top:0;z-index:20;
}
.th-date .dname{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.th-date .dnum{font-size:20px;font-weight:300;color:var(--ink);line-height:1.1;margin-top:2px}
.th-date.today{background:#e8f0fe}
.th-date.today .dnum{
  background:var(--acc);color:#fff;width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin:2px auto 0;
  font-weight:700;font-size:17px;
}
.th-date.wknd{background:#f5f0ff}
.th-date.wknd .dnum{color:#6c5ce7}
.th-date.new-month{border-left:3px solid var(--yel)}
.month-chip{
  display:block;background:var(--bk);color:#fff;
  font-size:8px;font-weight:800;letter-spacing:.6px;
  text-transform:uppercase;padding:2px 0;border-radius:3px;
  margin-bottom:3px;text-align:center;line-height:1.2;
}

/* ── Celdas de día (una por habitación) ── */
.day-cell{
  text-align:center;padding:5px 2px;cursor:pointer;
  vertical-align:middle;height:62px;
}
.day-cell:active{opacity:.65}
.day-cell.av{background:var(--avail-bg)}
.day-cell.bk{background:var(--booked-bg)}
.day-cell.bl{background:var(--blocked-bg)}
/* Icono de estado (✔ o —) */
.dc-icon{font-size:15px;font-weight:700;line-height:1}
.dc-icon.av-c{color:var(--avail)}
.dc-icon.bl-c{color:var(--blocked)}
/* Nombre del huésped */
.dc-name{
  font-size:11px;font-weight:700;color:var(--booked);
  line-height:1.2;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:52px;padding:0 2px;
}
/* Precio */
.dc-price{font-size:11px;font-weight:600;color:var(--ink);margin-top:2px;line-height:1}
.dc-price.dim{color:#bbb;text-decoration:line-through;font-weight:400}
.dc-price.ov{color:#e65c00}
.dc-price.na{color:#ccc;font-weight:400}

/* ── OVERLAY + SHEET ──────────────────────────────── */
#overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);
  opacity:0;pointer-events:none;transition:opacity .25s;z-index:40;
}
#overlay.open{opacity:1;pointer-events:auto}

#sheet{
  position:fixed;left:0;right:0;bottom:0;
  max-width:520px;margin:0 auto;
  background:#fff;border-radius:20px 20px 0 0;
  box-shadow:0 -8px 40px rgba(0,0,0,.18);
  z-index:41;
  transform:translateY(110%);
  transition:transform .28s cubic-bezier(.32,.72,0,1);
  max-height:88vh;overflow-y:auto;
  /* iOS safe area */
  padding-bottom:env(safe-area-inset-bottom,0px);
}
#sheet.open{transform:translateY(0)}

/* Handle bar */
.sh-handle{
  width:36px;height:4px;border-radius:2px;
  background:#d1d5db;margin:10px auto 0;
}

/* Sheet panels */
.sh-panel{display:none;padding:0 20px 24px}
.sh-panel.active{display:block}

/* Sheet header row */
.sh-head{
  display:flex;align-items:center;gap:10px;
  padding:16px 0 12px;
  border-bottom:1px solid var(--border);margin-bottom:16px;
}
.sh-back{
  background:#f3f4f6;border:none;border-radius:10px;
  width:34px;height:34px;font-size:18px;cursor:pointer;color:var(--ink);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sh-close{
  background:none;border:none;
  font-size:18px;cursor:pointer;color:var(--muted);
  margin-left:auto;padding:4px;
}
.sh-title{font-size:14px;font-weight:700;color:var(--bk);line-height:1.3}
.sh-subtitle{font-size:11px;color:var(--muted);margin-top:1px}

/* Day detail: status badge */
.day-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:99px;font-size:12px;font-weight:700;
  margin-bottom:16px;
}
.day-badge.av{background:var(--avail-bg);color:var(--avail)}
.day-badge.bk{background:var(--booked-bg);color:var(--booked)}
.day-badge.bl{background:var(--blocked-bg);color:var(--blocked)}

/* Booking detail rows */
.bk-info{display:flex;flex-direction:column;gap:2px;margin-bottom:20px}
.bk-name{font-size:20px;font-weight:700;color:var(--ink);margin-bottom:10px}
.bk-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:1px solid #f3f4f6;font-size:13px;
}
.bk-row:last-child{border-bottom:none}
.bk-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0}
.bk-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:block;margin-bottom:1px}
.bk-val{font-weight:600;color:var(--ink)}
.bk-link{font-weight:600;color:var(--acc);text-decoration:none}
.bk-link:active{opacity:.7}

/* Nights badge */
.nights-badge{
  display:inline-block;background:#f3f4f6;color:var(--muted);
  font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;margin-left:6px;
}

/* Call/WhatsApp buttons */
.contact-btns{display:flex;gap:10px;margin-top:4px}
.contact-btn{
  flex:1;padding:13px 0;border-radius:12px;border:none;
  font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.contact-btn.call{background:#e8f7ea;color:var(--avail)}
.contact-btn.wa{background:#dcf8c6;color:#1a7832}
.contact-btn:active{opacity:.8}

/* Available day action buttons */
.day-actions{display:flex;flex-direction:column;gap:8px}
.day-action{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;background:#f9fafb;border:none;
  border-radius:12px;cursor:pointer;text-align:left;width:100%;
  transition:background .1s;
}
.day-action:active{background:#f3f4f6}
.day-action-icon{font-size:18px;width:24px;text-align:center}
.day-action-text{flex:1}
.day-action-title{font-size:13px;font-weight:700;color:var(--ink);display:block}
.day-action-sub{font-size:11px;color:var(--muted);display:block;margin-top:1px}
.day-action-arrow{color:var(--muted);font-size:16px}

/* Price badge inside available actions */
.price-display{
  font-size:28px;font-weight:700;color:var(--ink);margin-bottom:16px;
}
.price-display span{font-size:14px;font-weight:400;color:var(--muted)}
.price-ov{color:#e65c00}

/* Unblock button */
.unblock-btn{
  width:100%;padding:14px;background:var(--avail-bg);
  border:1.5px solid var(--avail);border-radius:12px;
  color:var(--avail);font-size:14px;font-weight:700;
  cursor:pointer;margin-top:4px;
}
.unblock-btn:active{opacity:.8}

/* ── FORM PANELS ───────────────────────────────────── */
.form-grp{margin-bottom:14px}
.form-lbl{
  display:block;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;
  color:var(--muted);margin-bottom:5px;
}
.form-inp,.form-sel{
  width:100%;padding:11px 13px;
  border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;font-family:inherit;color:var(--ink);
  background:#fff;appearance:none;
  transition:border-color .15s;
}
.form-inp:focus,.form-sel:focus{outline:none;border-color:var(--acc)}
.form-row{display:flex;gap:10px}
.form-row .form-grp{flex:1}
.form-hint{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}

/* Availability toggle */
.avail-toggle{display:flex;gap:8px;margin-bottom:14px}
.av-tog{
  flex:1;padding:10px 0;border-radius:10px;
  border:1.5px solid var(--border);font-size:12px;font-weight:700;
  cursor:pointer;background:#fff;color:var(--muted);transition:all .15s;
}
.av-tog.on{background:var(--avail-bg);border-color:var(--avail);color:var(--avail)}
.av-tog.off{background:var(--blocked-bg);border-color:var(--blocked);color:var(--blocked)}

/* Form alert */
.form-alert{
  padding:10px 13px;border-radius:10px;font-size:12px;
  margin-bottom:12px;line-height:1.4;display:none;
}
.form-alert.err{background:#ffebee;color:var(--blocked);border:1px solid #ffcdd2;display:block}
.form-alert.ok{background:var(--avail-bg);color:var(--avail);border:1px solid #c8e6c9;display:block}

/* Submit button */
.sh-submit{
  width:100%;padding:14px;border-radius:12px;border:none;
  background:var(--acc);color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;margin-top:8px;transition:background .15s;
}
.sh-submit:active{background:var(--bk)}
.sh-submit:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>
<div id="app">

<!-- ══ LOGIN ══════════════════════════════════════════ -->
<div id="login-screen">
  <div class="logo">alc<em>homes</em></div>
  <div class="logo-sub">Beds24 Manager</div>
  <div id="pin-dots"></div>
  <div id="keypad"></div>
  <div id="login-err"></div>
</div>

<!-- ══ MAIN ═══════════════════════════════════════════ -->
<div id="main-screen">
  <div id="topbar">
    <div class="logo" style="font-size:17px">alc<em>homes</em></div>
    <div id="sync-pill">Cargando…</div>
  </div>
  <div id="month-bar">
    <span id="month-bar-text">Cargando…</span>
    <span id="month-bar-today">Hoy</span>
  </div>
  <div id="cal-wrap">
    <table id="cal"><tbody id="cal-body"></tbody></table>
  </div>
</div>

<!-- ══ SHEET ══════════════════════════════════════════ -->
<div id="overlay"></div>
<div id="sheet">
  <div class="sh-handle"></div>

  <!-- Panel: detalle del día -->
  <div id="panel-day" class="sh-panel">
    <div class="sh-head">
      <div>
        <div class="sh-title" id="sh-day-title">—</div>
        <div class="sh-subtitle" id="sh-day-sub"></div>
      </div>
      <button class="sh-close" id="sh-day-close">✕</button>
    </div>
    <div id="sh-day-body"></div>
  </div>

  <!-- Panel: editar precio -->
  <div id="panel-price" class="sh-panel">
    <div class="sh-head">
      <button class="sh-back" id="back-price">‹</button>
      <div>
        <div class="sh-title">Editar precio</div>
        <div class="sh-subtitle" id="price-subtitle"></div>
      </div>
      <button class="sh-close" id="price-close">✕</button>
    </div>
    <div id="price-alert" class="form-alert"></div>
    <div class="avail-toggle">
      <button class="av-tog on" id="av-open">✓ Disponible</button>
      <button class="av-tog" id="av-close">✗ Cerrar</button>
    </div>
    <div class="form-row">
      <div class="form-grp">
        <label class="form-lbl">Del</label>
        <input type="date" id="pr-from" class="form-inp"/>
      </div>
      <div class="form-grp">
        <label class="form-lbl">Al</label>
        <input type="date" id="pr-to" class="form-inp"/>
      </div>
    </div>
    <div class="form-grp">
      <label class="form-lbl">Standard Rate (€)</label>
      <input type="number" id="pr-price" class="form-inp" inputmode="decimal" step="0.5" placeholder="—"/>
      <div class="form-hint">No Reembolsable y Tarifa Semanal las calcula Booking.com automáticamente</div>
    </div>
    <button class="sh-submit" id="pr-save">Guardar en Beds24</button>
  </div>

  <!-- Panel: nueva reserva -->
  <div id="panel-booking" class="sh-panel">
    <div class="sh-head">
      <button class="sh-back" id="back-booking">‹</button>
      <div>
        <div class="sh-title">Nueva reserva</div>
        <div class="sh-subtitle" id="booking-subtitle"></div>
      </div>
      <button class="sh-close" id="booking-close">✕</button>
    </div>
    <div id="booking-alert" class="form-alert"></div>
    <div class="form-grp">
      <label class="form-lbl">Nombre completo *</label>
      <input type="text" id="nb-name" class="form-inp" placeholder="Ej: María García"/>
    </div>
    <div class="form-grp">
      <label class="form-lbl">Teléfono *</label>
      <input type="tel" id="nb-phone" class="form-inp" placeholder="+34 623 456 789"/>
    </div>
    <div class="form-grp">
      <label class="form-lbl">Email *</label>
      <input type="email" id="nb-email" class="form-inp" placeholder="Ej: maria@email.com"/>
    </div>
    <div class="form-grp">
      <label class="form-lbl">Habitación *</label>
      <select id="nb-room" class="form-sel"></select>
    </div>
    <div class="form-row">
      <div class="form-grp">
        <label class="form-lbl">Check-in *</label>
        <input type="date" id="nb-arrival" class="form-inp"/>
      </div>
      <div class="form-grp">
        <label class="form-lbl">Check-out *</label>
        <input type="date" id="nb-departure" class="form-inp"/>
      </div>
    </div>
    <button class="sh-submit" id="nb-save">Crear reserva</button>
  </div>

  <!-- Panel: bloquear fechas -->
  <div id="panel-block" class="sh-panel">
    <div class="sh-head">
      <button class="sh-back" id="back-block">‹</button>
      <div>
        <div class="sh-title">Bloquear fecha</div>
        <div class="sh-subtitle" id="block-subtitle"></div>
      </div>
      <button class="sh-close" id="block-close">✕</button>
    </div>
    <div id="block-alert" class="form-alert"></div>
    <div class="form-grp">
      <label class="form-lbl">Habitación *</label>
      <select id="bl-room" class="form-sel"></select>
    </div>
    <div class="form-row">
      <div class="form-grp">
        <label class="form-lbl">Desde *</label>
        <input type="date" id="bl-from" class="form-inp"/>
      </div>
      <div class="form-grp">
        <label class="form-lbl">Hasta *</label>
        <input type="date" id="bl-to" class="form-inp"/>
      </div>
    </div>
    <div class="form-grp">
      <label class="form-lbl">Motivo *</label>
      <select id="bl-reason" class="form-sel">
        <option value="Reparación">🔧 Reparación</option>
        <option value="Mantenimiento">🧹 Mantenimiento</option>
        <option value="Limpieza">🧼 Limpieza</option>
        <option value="Otro">📌 Otro</option>
      </select>
    </div>
    <button class="sh-submit" id="bl-save">Bloquear fechas</button>
  </div>

</div><!-- /sheet -->
</div><!-- /app -->

<script>
// ── CONFIG ─────────────────────────────────────────────
const API = "https://hostal-pdf-extractor.onrender.com/mobile";
const DAYS = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const MONTHS_LONG = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const MONTHS_SHORT = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

// ── STATE ──────────────────────────────────────────────
let PIN = "", ROOMS = [];
let DATA = {};        // { roomId: { bookings:[], prices:{} } }
let SEL_DATE = null, SEL_ROOM = null, AVAIL_STATE = 1;

// Nombres cortos para la columna lateral
const ROOM_LABEL = {
  702395: { name: "Deluxe",  sub: "Suite" },
  702396: { name: "Doble",   sub: "Estándar" },
  702397: { name: "Hab. 1",  sub: "Std Queen" },
  702398: { name: "Hab. 2",  sub: "Sup Queen" },
  702399: { name: "Hab. 3",  sub: "Queen" },
};

// ── HELPERS ────────────────────────────────────────────
const $ = s => document.querySelector(s);
function todayStr() {
  return new Date().toISOString().slice(0,10);
}
function dateLabel(ds, opts) {
  const d = new Date(ds + "T12:00:00");
  const s = d.toLocaleDateString("es-ES", opts || {weekday:"long",day:"numeric",month:"long",year:"numeric"});
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function nightCount(a, b) {
  const ms = new Date(b) - new Date(a);
  return Math.round(ms / 86400000);
}
function toWALink(phone) {
  const clean = phone.replace(/\D/g,"");
  const num = (clean.startsWith("34") && clean.length > 9) ? clean : "34" + clean.replace(/^0/,"");
  return "https://wa.me/" + num;
}
function setPill(t) { $("#sync-pill").textContent = t; }

// ── LOGIN ──────────────────────────────────────────────
function renderDots() {
  const w = $("#pin-dots"); w.innerHTML = "";
  for (let i = 0; i < 4; i++) {
    const d = document.createElement("div");
    d.className = "pin-dot" + (i < PIN.length ? " filled" : "");
    w.appendChild(d);
  }
}
function buildKeypad() {
  const keys = ["1","2","3","4","5","6","7","8","9","⌫","0","OK"];
  const w = $("#keypad"); w.innerHTML = "";
  keys.forEach(k => {
    const b = document.createElement("button");
    b.className = "key" + (k === "⌫" || k === "OK" ? " sub" : "");
    b.textContent = k;
    b.addEventListener("click", () => handleKey(k));
    w.appendChild(b);
  });
}
async function handleKey(k) {
  if (k === "⌫") PIN = PIN.slice(0,-1);
  else if (k === "OK") { await doLogin(); return; }
  else if (PIN.length < 4) PIN += k;
  renderDots();
  if (PIN.length === 4) await doLogin();
}
async function doLogin() {
  $("#login-err").textContent = "";
  try {
    const r = await fetch(`${API}/login`, {
      method: "POST",
      headers: {"x-app-pin": PIN, "content-type": "application/json"},
      body: JSON.stringify({pin: PIN})
    });
    const d = await r.json();
    if (d.ok) {
      $("#login-screen").style.display = "none";
      const ms = $("#main-screen");
      ms.style.display = "flex";
      await initApp();
    } else {
      $("#login-err").textContent = "PIN incorrecto";
      PIN = ""; renderDots();
    }
  } catch {
    $("#login-err").textContent = "Sin conexión";
    PIN = ""; renderDots();
  }
}

// ── INIT ───────────────────────────────────────────────
async function initApp() {
  try {
    const r = await fetch(`${API}/rooms`, {headers: {"x-app-pin": PIN}});
    const d = await r.json();
    ROOMS = d.rooms || [];
    ROOMS.forEach(r => { DATA[r.id] = {bookings: [], prices: {}}; });
    populateRoomSelects();
    await loadData();
  } catch(e) {
    setPill("Error al iniciar");
  }
}
function populateRoomSelects() {
  ["#nb-room","#bl-room"].forEach(sel => {
    const s = $(sel); s.innerHTML = "";
    ROOMS.forEach(r => {
      const o = document.createElement("option");
      o.value = r.id; o.textContent = r.name; s.appendChild(o);
    });
  });
}

// ── DATA LOADING ───────────────────────────────────────
async function loadData() {
  setPill("Cargando…");
  const today = new Date();
  const months = [];
  for (let i = 0; i < 12; i++) {
    const d = new Date(today.getFullYear(), today.getMonth() + i, 1);
    months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
  }
  // Reiniciar data
  ROOMS.forEach(r => { DATA[r.id] = {bookings:[], prices:{}}; });

  // Fase 1: primeros 2 meses × 5 hab. en paralelo → render rápido
  await Promise.allSettled(
    months.slice(0,2).flatMap(m => ROOMS.map(r => fetchAndMerge(r.id, m)))
  );
  renderCalendar();
  updateMonthBar();
  setPill("● cargando…");

  // Fase 2: meses restantes, de uno en uno (5 hab. en paralelo por mes)
  for (const m of months.slice(2)) {
    await Promise.allSettled(ROOMS.map(r => fetchAndMerge(r.id, m)));
    renderCalendar();
  }
  setPill("✓");

  const cw = $("#cal-wrap");
  cw.removeEventListener("scroll", handleCalScroll);
  cw.addEventListener("scroll", handleCalScroll);
}

async function fetchAndMerge(roomId, month) {
  try {
    const res = await fetchMonth(roomId, month);
    if (!res?.ok) return;
    const d = DATA[roomId];
    (res.bookings || []).forEach(b => {
      if (!d.bookings.find(x => x.arrival === b.arrival && x.guestName === b.guestName))
        d.bookings.push(b);
    });
    Object.assign(d.prices, res.prices || {});
  } catch {}
}

async function fetchMonth(roomId, month) {
  const r = await fetch(`${API}/calendar?roomId=${roomId}&month=${month}&pin=${PIN}`, {
    headers: {"x-app-pin": PIN}
  });
  return r.json();
}

// ── CALENDAR RENDER ────────────────────────────────────
function roomBookedOn(roomId, ds) {
  return (DATA[roomId]?.bookings || []).find(b => b.arrival <= ds && b.departure > ds);
}
function fmtPrice(v) {
  return v != null ? "€" + Number(v).toFixed(0) : "—";
}

function renderCalendar() {
  const today = new Date();
  const todaySt = todayStr();
  const tb = $("#cal-body"); tb.innerHTML = "";

  // 365 días desde hoy
  const dates = [];
  for (let i = 0; i < 365; i++) {
    const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() + i);
    const ds = d.toISOString().slice(0,10);
    dates.push({ds, dow: d.getDay(), day: d.getDate(), month: d.getMonth(), year: d.getFullYear()});
  }

  // ── Fila de cabecera: esquina + fechas ──
  const trH = document.createElement("tr");
  // Celda esquina (sticky top+left)
  const corner = document.createElement("th");
  corner.className = "col-corner";
  corner.style.cssText = "position:sticky;left:0;top:0;z-index:30;width:82px;min-width:82px;background:var(--bk);border-right:3px solid rgba(255,255,255,.2)";
  trH.appendChild(corner);

  dates.forEach(({ds, dow, day, month, year}, i) => {
    const th = document.createElement("th");
    const isToday = ds === todaySt;
    const isWknd = dow === 0 || dow === 6;
    const showMonth = i === 0 || day === 1;
    const chip = showMonth ? `<div class="month-chip">${MONTHS_SHORT[month].toUpperCase()}</div>` : "";
    th.className = "th-date"
      + (isToday ? " today" : "")
      + (isWknd ? " wknd" : "")
      + (showMonth && i > 0 ? " new-month" : "");
    th.innerHTML = chip + `<div class="dname">${DAYS[dow]}</div><div class="dnum">${day}</div>`;
    trH.appendChild(th);
  });
  tb.appendChild(trH);

  // ── Una fila por habitación ──
  ROOMS.forEach((room, ri) => {
    const tr = document.createElement("tr");
    tr.className = "room-row";

    // Celda nombre (sticky left)
    const lbl = document.createElement("td");
    lbl.className = "room-lbl";
    const rl = ROOM_LABEL[room.id] || {name: room.name, sub: ""};
    lbl.innerHTML = `<div class="room-name">${rl.name}</div><div class="room-sub">${rl.sub}</div>`;
    tr.appendChild(lbl);

    // Celdas de días
    dates.forEach(({ds}) => {
      const bk = roomBookedOn(room.id, ds);
      const pr = (DATA[room.id]?.prices || {})[ds] || {};
      const bl = pr.numAvail === 0;

      const td = document.createElement("td");
      td.className = "day-cell" + (bk ? " bk" : bl ? " bl" : " av");

      if (bk) {
        const first = (bk.guestName || "Hués.").split(" ")[0].substring(0, 7);
        td.innerHTML = `<div class="dc-name">${first}</div><div class="dc-price dim">${fmtPrice(pr.price1)}</div>`;
      } else if (bl) {
        td.innerHTML = `<div class="dc-icon bl-c">—</div>`;
      } else {
        const pCls = pr.price1 == null ? " na" : pr.isOverride ? " ov" : "";
        td.innerHTML = `<div class="dc-icon av-c">✔</div><div class="dc-price${pCls}">${fmtPrice(pr.price1)}</div>`;
      }

      td.addEventListener("click", () => openDaySheet(ds, room));
      tr.appendChild(td);
    });

    tb.appendChild(tr);
  });
}


// ── SHEET SYSTEM ───────────────────────────────────────
function openSheet() {
  $("#overlay").classList.add("open");
  $("#sheet").classList.add("open");
}
function closeSheet() {
  $("#overlay").classList.remove("open");
  $("#sheet").classList.remove("open");
}
function showPanel(id) {
  document.querySelectorAll(".sh-panel").forEach(p => p.classList.remove("active"));
  $(`#${id}`).classList.add("active");
}

// ── DAY SHEET ──────────────────────────────────────────
function openDaySheet(ds, room) {
  SEL_DATE = ds;
  SEL_ROOM = room;
  const bk = roomBookedOn(room.id, ds);
  const pr = (DATA[room.id]?.prices || {})[ds] || {};
  const bl = pr.numAvail === 0;

  const rl = ROOM_LABEL[room.id] || {name: room.name};
  $("#sh-day-title").textContent = dateLabel(ds, {weekday:"long",day:"numeric",month:"long"});
  $("#sh-day-sub").textContent = rl.name;

  const body = $("#sh-day-body");
  body.innerHTML = "";

  if (bk) {
    // ── BOOKED ──
    const nights = nightCount(bk.arrival, bk.departure);
    const arrLabel = dateLabel(bk.arrival, {day:"numeric",month:"short",year:"numeric"});
    const depLabel = dateLabel(bk.departure, {day:"numeric",month:"short",year:"numeric"});

    let html = `<div class="day-badge bk">✖ Reservado</div>
    <div class="bk-info">
      <div class="bk-name">${bk.guestName || "Huésped"}</div>`;

    // Check-in / Check-out
    html += `<div class="bk-row">
      <span class="bk-icon">📅</span>
      <div>
        <span class="bk-label">Check-in</span>
        <span class="bk-val">${arrLabel}</span>
      </div>
    </div>
    <div class="bk-row">
      <span class="bk-icon">📅</span>
      <div>
        <span class="bk-label">Check-out</span>
        <span class="bk-val">${depLabel} <span class="nights-badge">${nights} noche${nights!==1?"s":""}</span></span>
      </div>
    </div>`;

    // Phone
    if (bk.phone) {
      html += `<div class="bk-row">
        <span class="bk-icon">📞</span>
        <div>
          <span class="bk-label">Teléfono</span>
          <a href="tel:${bk.phone}" class="bk-link">${bk.phone}</a>
        </div>
      </div>`;
    }
    // Email
    if (bk.email) {
      html += `<div class="bk-row">
        <span class="bk-icon">✉️</span>
        <div>
          <span class="bk-label">Email</span>
          <a href="mailto:${bk.email}" class="bk-link">${bk.email}</a>
        </div>
      </div>`;
    }
    html += `</div>`;

    // Call / WhatsApp buttons
    if (bk.phone) {
      html += `<div class="contact-btns">
        <a href="tel:${bk.phone}" class="contact-btn call">📞 Llamar</a>
        <a href="${toWALink(bk.phone)}" class="contact-btn wa" target="_blank">💬 WhatsApp</a>
      </div>`;
    }

    body.innerHTML = html;

  } else if (bl) {
    // ── BLOCKED ──
    body.innerHTML = `<div class="day-badge bl">— Bloqueado</div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:20px;line-height:1.5">
      Esta fecha está bloqueada y no está disponible para reservas.
    </p>
    <button class="unblock-btn" id="unblock-btn">✔ Desbloquear esta fecha</button>`;

    $("#unblock-btn").addEventListener("click", () => unblockDate(ds));

  } else {
    // ── AVAILABLE ──
    const price = pr.price1;
    const priceHtml = price != null
      ? `<div class="price-display ${pr.isOverride ? "price-ov" : ""}">
          ${fmtPrice(price)} <span>Standard Rate${pr.isOverride ? " · modificado" : ""}</span>
        </div>`
      : `<div class="price-display"><span>Sin precio asignado</span></div>`;

    body.innerHTML = `<div class="day-badge av">✔ Disponible</div>
    ${priceHtml}
    <div class="day-actions">
      <button class="day-action" id="act-price">
        <span class="day-action-icon">💲</span>
        <span class="day-action-text">
          <span class="day-action-title">Editar precio</span>
          <span class="day-action-sub">Modificar tarifa o disponibilidad</span>
        </span>
        <span class="day-action-arrow">›</span>
      </button>
      <button class="day-action" id="act-booking">
        <span class="day-action-icon">➕</span>
        <span class="day-action-text">
          <span class="day-action-title">Nueva reserva</span>
          <span class="day-action-sub">Registrar una reserva manual</span>
        </span>
        <span class="day-action-arrow">›</span>
      </button>
      <button class="day-action" id="act-block">
        <span class="day-action-icon">🚫</span>
        <span class="day-action-text">
          <span class="day-action-title">Bloquear fecha</span>
          <span class="day-action-sub">Reparación, mantenimiento o limpieza</span>
        </span>
        <span class="day-action-arrow">›</span>
      </button>
    </div>`;

    // Pre-fill price panel when tapping "Editar precio"
    $("#act-price").addEventListener("click", () => {
      $("#price-subtitle").textContent = dateLabel(ds, {day:"numeric",month:"long"}) + " · " + SEL_ROOM.name;
      $("#pr-from").value = ds;
      $("#pr-to").value = ds;
      $("#pr-price").value = price != null ? price : "";
      AVAIL_STATE = 1;
      updAvToggle();
      clearAlert("#price-alert");
      showPanel("panel-price");
    });

    // Pre-fill booking panel
    $("#act-booking").addEventListener("click", () => {
      const next = new Date(ds + "T12:00:00");
      next.setDate(next.getDate() + 1);
      const depDate = next.toISOString().slice(0,10);
      $("#booking-subtitle").textContent = SEL_ROOM.name;
      $("#nb-arrival").value = ds;
      $("#nb-departure").value = depDate;
      $("#nb-room").value = SEL_ROOM.id;
      clearAlert("#booking-alert");
      showPanel("panel-booking");
    });

    // Pre-fill block panel
    $("#act-block").addEventListener("click", () => {
      const next = new Date(ds + "T12:00:00");
      next.setDate(next.getDate() + 1);
      const toDate = next.toISOString().slice(0,10);
      $("#block-subtitle").textContent = SEL_ROOM.name;
      $("#bl-from").value = ds;
      $("#bl-to").value = toDate;
      $("#bl-room").value = SEL_ROOM.id;
      clearAlert("#block-alert");
      showPanel("panel-block");
    });
  }

  showPanel("panel-day");
  openSheet();
}

// ── UNBLOCK ────────────────────────────────────────────
async function unblockDate(ds) {
  const btn = $("#unblock-btn");
  btn.textContent = "Desbloqueando…"; btn.disabled = true;
  try {
    const r = await fetch(`${API}/update`, {
      method: "POST",
      headers: {"content-type":"application/json","x-app-pin":PIN},
      body: JSON.stringify({pin: PIN, roomId: SEL_ROOM.id, from: ds, to: ds, numAvail: 1})
    });
    const d = await r.json();
    if (d.ok) {
      closeSheet();
      await loadData();
    } else {
      btn.textContent = "✗ Error al desbloquear"; btn.disabled = false;
    }
  } catch {
    btn.textContent = "✗ Error de conexión"; btn.disabled = false;
  }
}

// ── AVAILABILITY TOGGLE (price panel) ─────────────────
function updAvToggle() {
  $("#av-open").className = "av-tog" + (AVAIL_STATE === 1 ? " on" : "");
  $("#av-close").className = "av-tog" + (AVAIL_STATE === 0 ? " off" : "");
}
$("#av-open").addEventListener("click", () => { AVAIL_STATE = 1; updAvToggle(); });
$("#av-close").addEventListener("click", () => { AVAIL_STATE = 0; updAvToggle(); });

// ── ALERT HELPERS ──────────────────────────────────────
function showAlert(sel, type, msg) {
  const el = $(sel);
  el.className = "form-alert " + type;
  el.textContent = msg;
  el.style.display = "block";
}
function clearAlert(sel) {
  const el = $(sel);
  el.className = "form-alert";
  el.style.display = "none";
  el.textContent = "";
}

// ── SAVE PRICE ─────────────────────────────────────────
$("#pr-save").addEventListener("click", async () => {
  clearAlert("#price-alert");
  const from = $("#pr-from").value || SEL_DATE;
  const to = $("#pr-to").value || SEL_DATE;
  const body = {pin: PIN, roomId: SEL_ROOM.id, from, to, numAvail: AVAIL_STATE};
  const v = $("#pr-price").value;
  if (v !== "") body.price1 = Number(v);
  const btn = $("#pr-save");
  btn.textContent = "Guardando…"; btn.disabled = true;
  try {
    const r = await fetch(`${API}/update`, {
      method: "POST",
      headers: {"content-type":"application/json","x-app-pin":PIN},
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (d.ok) {
      showAlert("#price-alert","ok","✓ Guardado correctamente");
      setTimeout(async () => { closeSheet(); await loadData(); }, 1200);
    } else {
      showAlert("#price-alert","err","✗ Error: " + (d.error?.message || JSON.stringify(d.error)));
    }
  } catch {
    showAlert("#price-alert","err","✗ Error de conexión");
  } finally {
    btn.textContent = "Guardar en Beds24"; btn.disabled = false;
  }
});

// ── CREATE BOOKING ─────────────────────────────────────
$("#nb-save").addEventListener("click", async () => {
  clearAlert("#booking-alert");
  const name = ($("#nb-name").value || "").trim();
  const phone = ($("#nb-phone").value || "").trim();
  const email = ($("#nb-email").value || "").trim();
  const roomId = $("#nb-room").value;
  const arrival = $("#nb-arrival").value;
  const departure = $("#nb-departure").value;

  if (!name || !phone || !email || !roomId || !arrival || !departure) {
    showAlert("#booking-alert","err","✗ Completa todos los campos"); return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showAlert("#booking-alert","err","✗ Email inválido"); return;
  }
  if (arrival >= departure) {
    showAlert("#booking-alert","err","✗ La salida debe ser posterior a la entrada"); return;
  }

  const btn = $("#nb-save");
  btn.textContent = "Creando…"; btn.disabled = true;
  try {
    const r = await fetch(`${API}/create-booking`, {
      method: "POST",
      headers: {"content-type":"application/json","x-app-pin":PIN},
      body: JSON.stringify({name, phone, email, roomId: parseInt(roomId), arrival, departure})
    });
    const d = await r.json();
    if (d.ok) {
      showAlert("#booking-alert","ok","✓ Reserva creada en Beds24");
      // Clear form
      ["#nb-name","#nb-phone","#nb-email","#nb-arrival","#nb-departure"].forEach(s => $(s).value = "");
      setTimeout(async () => { closeSheet(); await loadData(); }, 1400);
    } else {
      showAlert("#booking-alert","err","✗ Error: " + (d.error || JSON.stringify(d)));
    }
  } catch(e) {
    showAlert("#booking-alert","err","✗ Error: " + e.message);
  } finally {
    btn.textContent = "Crear reserva"; btn.disabled = false;
  }
});

// ── BLOCK DATES ────────────────────────────────────────
$("#bl-save").addEventListener("click", async () => {
  clearAlert("#block-alert");
  const roomId = $("#bl-room").value;
  const from = $("#bl-from").value;
  const to = $("#bl-to").value;
  const reason = $("#bl-reason").value;

  if (!roomId || !from || !to) {
    showAlert("#block-alert","err","✗ Completa todos los campos"); return;
  }
  if (from >= to) {
    showAlert("#block-alert","err","✗ La fecha final debe ser posterior"); return;
  }

  const btn = $("#bl-save");
  btn.textContent = "Bloqueando…"; btn.disabled = true;
  try {
    const r = await fetch(`${API}/block-dates`, {
      method: "POST",
      headers: {"content-type":"application/json","x-app-pin":PIN},
      body: JSON.stringify({roomId: parseInt(roomId), from, to, reason})
    });
    const d = await r.json();
    if (d.ok) {
      showAlert("#block-alert","ok","✓ Fechas bloqueadas");
      setTimeout(async () => { closeSheet(); await loadData(); }, 1200);
    } else {
      showAlert("#block-alert","err","✗ Error: " + (d.error || JSON.stringify(d)));
    }
  } catch(e) {
    showAlert("#block-alert","err","✗ Error: " + e.message);
  } finally {
    btn.textContent = "Bloquear fechas"; btn.disabled = false;
  }
});

// ── NAVIGATION (back buttons, close) ───────────────────
["price","booking","block"].forEach(name => {
  $(`#back-${name}`).addEventListener("click", () => showPanel("panel-day"));
  $(`#${name}-close`).addEventListener("click", closeSheet);
});
$("#sh-day-close").addEventListener("click", closeSheet);
$("#overlay").addEventListener("click", closeSheet);

// ── MONTH BAR ──────────────────────────────────────────
function updateMonthBar() {
  const cw = $("#cal-wrap");
  const scrollLeft = cw.scrollLeft;
  const cellWidth = 56; // valor de --cell en px
  const dayIndex = Math.floor(scrollLeft / cellWidth);
  const today = new Date();
  const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() + dayIndex);
  $("#month-bar-text").textContent =
    MONTHS_LONG[d.getMonth()] + " " + d.getFullYear();
}
function handleCalScroll() { updateMonthBar(); }

// Botón "Hoy": vuelve al inicio del scroll
$("#month-bar-today").addEventListener("click", () => {
  $("#cal-wrap").scrollTo({left: 0, behavior: "smooth"});
  updateMonthBar();
});

// ── BOOT ───────────────────────────────────────────────
buildKeypad();
renderDots();
</script>
